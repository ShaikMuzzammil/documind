# DocuMind CI — install, lint, type-check, build on every push/MR.
# Jobs only run when a runner/pipeline is available; missing CI minutes will
# leave the pipeline pending rather than blocking merges.
workflow:
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - install
  - verify
  - build

default:
  image: node:20-alpine
  cache:
    key:
      files:
        - package-lock.json
        - package.json
    paths:
      - node_modules/

install:
  stage: install
  script:
    - npm install
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: verify
  needs: [install]
  script:
    - npm run lint
  allow_failure: true

typecheck:
  stage: verify
  needs: [install]
  script:
    - npm run typecheck

build:
  stage: build
  needs: [install]
  script:
    - npm run build
